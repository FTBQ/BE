<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bullseye</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      position: relative;
      width: 1200px;
      height: 500px;
    }

    .container img {
      width: 1200px;
      height: 500px;
      display: block;
    }

    .overlay {
      position: absolute;
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      pointer-events: none;
      white-space: nowrap;
      color: #ffffff;
    }

    /* ── 상단 4개 ── */
    .txt-date  { top: 55px;  left: 258px; font-size: 14px; }
    .txt-time  { top: 107px; left: 258px; font-size: 14px; }
    .txt-loc   { top: 55px;  left: 745px; font-size: 14px; }
    .txt-class { top: 107px; left: 745px; font-size: 14px; }

    /* ── 그룹 제목 옆 숫자 ── */
    .txt-g1num { top: 200px; left: 465px;  font-size: 14px; }
    .txt-g2num { top: 200px; left: 1110px; font-size: 14px; }
    .txt-g3num { top: 352px; left: 465px;  font-size: 14px; }
    .txt-g4num { top: 352px; left: 1110px; font-size: 14px; }

    /* ── 세이길로스 멤버 상태 ── */
    .txt-g1m1 { top: 253px; left: 175px; font-size: 13px; }
    .txt-g1m2 { top: 253px; left: 368px; font-size: 13px; }
    .txt-g1m3 { top: 282px; left: 175px; font-size: 13px; }
    .txt-g1m4 { top: 282px; left: 368px; font-size: 13px; }

    /* ── 로스트 페이퍼 멤버 상태 ── */
    .txt-g2m1 { top: 253px; left: 718px; font-size: 13px; }
    .txt-g2m2 { top: 253px; left: 895px; font-size: 13px; }
    .txt-g2m3 { top: 282px; left: 718px; font-size: 13px; }
    .txt-g2m4 { top: 282px; left: 895px; font-size: 13px; }

    /* ── 속하지 않은자 멤버 상태 ── */
    .txt-g3m1 { top: 405px; left: 175px; font-size: 13px; }
    .txt-g3m2 { top: 405px; left: 368px; font-size: 13px; }
    .txt-g3m3 { top: 434px; left: 175px; font-size: 13px; }
    .txt-g3m4 { top: 434px; left: 368px; font-size: 13px; }

    /* ── 보리소프 패밀리 멤버 상태 ── */
    .txt-g4m1 { top: 405px; left: 718px; font-size: 13px; }
    .txt-g4m2 { top: 405px; left: 895px; font-size: 13px; }
    .txt-g4m3 { top: 434px; left: 718px; font-size: 13px; }
    .txt-g4m4 { top: 434px; left: 895px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://github.com/FTBQ/BE/blob/main/stt.png?raw=true" alt="base">

    <!-- 상단 4개 -->
    <div class="overlay txt-date"  id="date"></div>
    <div class="overlay txt-time"  id="time"></div>
    <div class="overlay txt-loc"   id="loc"></div>
    <div class="overlay txt-class" id="class"></div>

    <!-- 그룹 숫자 -->
    <div class="overlay txt-g1num" id="g1"></div>
    <div class="overlay txt-g2num" id="g2"></div>
    <div class="overlay txt-g3num" id="g3"></div>
    <div class="overlay txt-g4num" id="g4"></div>

    <!-- 세이길로스 -->
    <div class="overlay txt-g1m1" id="g1m1"></div>
    <div class="overlay txt-g1m2" id="g1m2"></div>
    <div class="overlay txt-g1m3" id="g1m3"></div>
    <div class="overlay txt-g1m4" id="g1m4"></div>

    <!-- 로스트 페이퍼 -->
    <div class="overlay txt-g2m1" id="g2m1"></div>
    <div class="overlay txt-g2m2" id="g2m2"></div>
    <div class="overlay txt-g2m3" id="g2m3"></div>
    <div class="overlay txt-g2m4" id="g2m4"></div>

    <!-- 속하지 않은자 -->
    <div class="overlay txt-g3m1" id="g3m1"></div>
    <div class="overlay txt-g3m2" id="g3m2"></div>
    <div class="overlay txt-g3m3" id="g3m3"></div>
    <div class="overlay txt-g3m4" id="g3m4"></div>

    <!-- 보리소프 패밀리 -->
    <div class="overlay txt-g4m1" id="g4m1"></div>
    <div class="overlay txt-g4m2" id="g4m2"></div>
    <div class="overlay txt-g4m3" id="g4m3"></div>
    <div class="overlay txt-g4m4" id="g4m4"></div>
  </div>

  <script>
    const p = new URLSearchParams(window.location.search);
    const ids = [
      'date','time','loc','class',
      'g1','g2','g3','g4',
      'g1m1','g1m2','g1m3','g1m4',
      'g2m1','g2m2','g2m3','g2m4',
      'g3m1','g3m2','g3m3','g3m4',
      'g4m1','g4m2','g4m3','g4m4'
    ];
    ids.forEach(id => {
      const val = p.get(id);
      if (val) document.getElementById(id).textContent = val;
    });
  </script>
</body>
</html>
